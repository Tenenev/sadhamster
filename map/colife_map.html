<title>Colife — подборка для любимой супруги 🏠</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1c1c1e}
.header{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:1000}
.header h1{font-size:17px;font-weight:600}
.header .count{font-size:13px;color:#8e8e93}
.filters{background:#fff;padding:10px 16px;border-bottom:1px solid #e5e5ea;overflow-x:auto;white-space:nowrap}
.fbtn{display:inline-block;padding:6px 14px;border-radius:20px;border:1.5px solid #e5e5ea;font-size:13px;margin-right:8px;cursor:pointer;background:#fff;color:#1c1c1e;transition:all .2s}
.fbtn.active{background:#007aff;border-color:#007aff;color:#fff}
.metro-filter{background:#fff;padding:8px 16px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;gap:10px}
.mf-label{font-size:13px;color:#1c1c1e;white-space:nowrap}
.mf-slider{flex:1;accent-color:#007aff}
.mf-val{font-size:13px;font-weight:600;color:#007aff;white-space:nowrap;min-width:52px;text-align:right}
.price-filter{background:#fff;padding:8px 16px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;gap:10px}
.geo-filter{background:#fff;padding:8px 16px;border-bottom:1px solid #e5e5ea;overflow-x:auto;white-space:nowrap}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5ea}
.tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:500;cursor:pointer;color:#8e8e93;border-bottom:2px solid transparent}
.tab.active{color:#007aff;border-bottom-color:#007aff}
#list-view{height:calc(100vh - 242px);overflow-y:auto;padding:12px}
#list-inner{max-width:520px;margin:0 auto}
.card{background:#fff;border-radius:16px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-photos{position:relative;height:220px;overflow:hidden;background:#f0f0f5}
.card-photo-main{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;user-select:none}
.no-photo{position:absolute;top:0;left:0;width:100%;height:100%;background:#f0f0f5;display:flex;align-items:center;justify-content:center;font-size:40px}
.badge{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;z-index:2}
.badge-ok{background:#34c759;color:#fff}
.badge-later{background:#ff9500;color:#fff}
.badge-ref{background:#ffd60a;color:#000}
.photo-counter{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 8px;border-radius:12px;z-index:2}
.photo-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;width:32px;height:44px;font-size:20px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background .15s}
.photo-nav:hover{background:rgba(0,0,0,.65)}
.photo-prev{left:4px}
.photo-next{right:4px}
.card-body{padding:14px}
.card-price{font-size:20px;font-weight:700}
.card-price-old{font-size:14px;color:#8e8e93;text-decoration:line-through;margin-left:6px}
.card-addr{font-size:14px;color:#3c3c43;margin:4px 0}
.card-metro{font-size:13px;color:#007aff;margin:2px 0}
.card-size{font-size:12px;color:#8e8e93;margin:2px 0}
.card-actions{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.card-actions-row{display:flex;gap:6px}
.btn-fav{flex:0 0 40px;height:40px;border-radius:10px;border:1.5px solid #e5e5ea;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-fav.active{background:#fff0f0;border-color:#ff3b30}
.btn-open{flex:1;height:40px;border-radius:10px;background:#007aff;color:#fff!important;border:none;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none!important;display:flex;align-items:center;justify-content:center}
.btn-ymap{flex:1;height:40px;border-radius:10px;background:#fc3f1d;color:#fff!important;border:none;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none!important;display:flex;align-items:center;justify-content:center}
.btn-2gis{flex:1;height:40px;border-radius:10px;background:#00b33c;color:#fff!important;border:none;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none!important;display:flex;align-items:center;justify-content:center}
.btn-showmap{flex:1;height:40px;border-radius:10px;border:1.5px solid #e5e5ea;background:#fff;color:#1c1c1e;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
#map-view{display:none;height:calc(100vh - 202px)}
#map{width:100%;height:100%}
.mp-img{width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:8px}
.mp-price{font-size:15px;font-weight:700;color:#007aff;margin:2px 0}
.mp-addr{font-size:12px;color:#666;margin:2px 0}
.mp-metro{font-size:12px;color:#007aff;margin:2px 0}
.mp-link{display:inline-block;padding:8px 10px;background:#007aff;color:#fff!important;text-align:center;border-radius:8px;text-decoration:none!important;font-size:12px;font-weight:600;flex:1}
.mp-ymap{display:inline-block;padding:8px 10px;background:#fc3f1d;color:#fff!important;text-align:center;border-radius:8px;text-decoration:none!important;font-size:12px;font-weight:600;flex:1}
.mp-2gis{display:inline-block;padding:8px 10px;background:#00b33c;color:#fff!important;text-align:center;border-radius:8px;text-decoration:none!important;font-size:12px;font-weight:600;flex:1}
.mp-img-wrap{position:relative;height:150px;overflow:hidden;border-radius:8px;margin-bottom:8px;background:#f0f0f5}
.mp-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:8px}
.mp-photo-counter{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 6px;border-radius:10px;z-index:2}
.mp-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);color:#fff;border:none;width:28px;height:40px;font-size:18px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;border-radius:4px}
.mp-prev{left:3px}.mp-next{right:3px}
.mp-actions{display:flex;gap:8px;margin-top:8px;align-items:center}
.mp-fav{width:36px;height:36px;border-radius:10px;border:1.5px solid #e5e5ea;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mp-fav.active{background:#fff0f0;border-color:#ff3b30}
</style>
</head>

<div class="header">

<div class="price-filter">

<div class="geo-filter">

</div>
<div class="tabs">
  <div class="tab active" id="tab-list" onclick="showTab('list')">📋 Список</div>
  <div class="tab" id="tab-map" onclick="showTab('map')">🗺️ Карта</div>
</div>
<div id="list-view"></div>

let currentFilter = 'all';
let maxMetroMin = 999;
let maxPrice = 999999;
let geoFilter = 'all';
let leafletMap = null;
let markers = [];

/* ---- geo helpers ---- */
function haversinKm(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.pow(Math.sin(dLat/2),2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.pow(Math.sin(dLon/2),2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
/* Approximate ring radii from Kremlin (55.7520, 37.6175) */
const GEO_RADII = { sadovoe: 3.3, ttk: 7.5, mkad: 17.5 };
function isInGeo(l, area) {
  if (area === 'all' || !l.lat || !l.lon) return true;
  return haversinKm(l.lat, l.lon, 55.7520, 37.6175) <= GEO_RADII[area];
}

/* ---- helpers ---- */
function getFavs() { return JSON.parse(localStorage.getItem('colife_favs') || '[]'); }
function saveFavs(f) { localStorage.setItem('colife_favs', JSON.stringify(f)); }
function isFav(id) { return getFavs().includes(id); }

function priceStr(l) {
  if (!l.price) return 'цена не указана';
  return l.price.toLocaleString('ru-RU') + ' ₽/мес';
}
function metroStr(l) {
  if (!l.metro || !l.metro.length) return '';
  return l.metro.map(m => m.minutes ? 'м. ' + m.station + ' (' + m.minutes + ' мин)' : 'м. ' + m.station).join(' · ');
}
/* Safe text node helper — avoids innerHTML with untrusted strings */
function txt(s) { return document.createTextNode(String(s || '')); }
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

/* ---- filter ---- */
function getFiltered() {
  let list = ALL;
  if (currentFilter === 'fav') list = list.filter(l => getFavs().includes(l.id));
  if (maxMetroMin < 999) {
    list = list.filter(l => l.metro && l.metro.some(m => m.minutes && m.minutes <= maxMetroMin));
  }
  if (maxPrice < 999999) list = list.filter(l => l.price && l.price <= maxPrice);
  if (geoFilter !== 'all') list = list.filter(l => isInGeo(l, geoFilter));
  return list;
}

function saveState() {
  localStorage.setItem('colife_state', JSON.stringify({
    filter: currentFilter, metro: maxMetroMin, price: maxPrice, geo: geoFilter, tab: _activeTab
  }));
}

function setMetroFilter(val) {
  maxMetroMin = parseInt(val) >= 40 ? 999 : parseInt(val);
  document.getElementById('metro-val').textContent = maxMetroMin >= 999 ? 'любое' : '≤ ' + val + ' мин';
  saveState();
  renderList();
  if (leafletMap) updateMarkers();
}

function setPriceFilter(val) {
  maxPrice = parseInt(val) >= 55 ? 999999 : parseInt(val) * 1000;
  document.getElementById('price-val').textContent = maxPrice >= 999999 ? 'любая' : '≤ ' + val + 'k';
  saveState();
  renderList();
  if (leafletMap) updateMarkers();
}

function setGeoFilter(area) {
  geoFilter = area;
  ['all','sadovoe','ttk','mkad'].forEach(id => {
    document.getElementById('geo-' + id).classList.toggle('active', id === area);
  });
  saveState();
  renderList();
  if (leafletMap) updateMarkers();
}

/* ---- render card (DOM-only, no innerHTML with user data) ---- */
function buildCard(l) {
  const card = el('div','card');

  /* photo slider */
  const photosWrap = el('div','card-photos');
  const photos = l.photos || [];
  let idx = 0;

  if (photos.length) {
    const img = el('img','card-photo-main');
    img.src = photos[0];
    img.alt = 'фото';
    photosWrap.appendChild(img);

    if (photos.length > 1) {
      /* counter */
      const counter = el('span','photo-counter');
      counter.appendChild(txt('1 / ' + photos.length));
      photosWrap.appendChild(counter);

      /* update helper */
      const go = (newIdx) => {
        idx = (newIdx + photos.length) % photos.length;
        img.src = photos[idx];
        counter.textContent = (idx + 1) + ' / ' + photos.length;
      };

      /* arrow buttons */
      const prev = el('button','photo-nav photo-prev');
      prev.type = 'button';
      prev.appendChild(txt('‹'));
      prev.addEventListener('click', e => { e.stopPropagation(); go(idx - 1); });
      photosWrap.appendChild(prev);

      const next = el('button','photo-nav photo-next');
      next.type = 'button';
      next.appendChild(txt('›'));
      next.addEventListener('click', e => { e.stopPropagation(); go(idx + 1); });
      photosWrap.appendChild(next);

      /* touch swipe */
      let startX = 0;
      img.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
      img.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 40) go(idx + (dx < 0 ? 1 : -1));
      }, {passive: true});
    }
  } else {
    const ph = el('div','no-photo');
    ph.appendChild(txt('🏠'));
    photosWrap.appendChild(ph);
  }

  /* badge */
  const badge = el('span','badge');
  if (l.is_reference) { badge.className = 'badge badge-ref'; badge.appendChild(txt('⭐ Эталон')); }
  else { badge.className = 'badge badge-ok'; badge.appendChild(txt('✅ Свободно')); }
  photosWrap.appendChild(badge);
  card.appendChild(photosWrap);

  /* body */
  const body = el('div','card-body');

  const priceRow = el('div','');
  priceRow.style.display = 'flex';
  priceRow.style.alignItems = 'baseline';
  const priceEl = el('span','card-price');
  priceEl.appendChild(txt(priceStr(l)));
  priceRow.appendChild(priceEl);
  if (l.price_original && l.price_original !== l.price) {
    const old = el('span','card-price-old');
    old.appendChild(txt(l.price_original.toLocaleString('ru-RU') + ' ₽'));
    priceRow.appendChild(old);
  }
  body.appendChild(priceRow);

  const addr = el('div','card-addr');
  addr.appendChild(txt('📍 ' + (l.address || 'адрес не указан')));
  body.appendChild(addr);

  if (l.metro && l.metro.length) {
    const metro = el('div','card-metro');
    metro.appendChild(txt('🚇 ' + metroStr(l)));
    body.appendChild(metro);
  }
  if (l.size_sqm) {
    const size = el('div','card-size');
    size.appendChild(txt('📐 ' + l.size_sqm + ' кв.м'));
    body.appendChild(size);
  }

  /* actions — row 1: ❤️ + Объявление */
  const actions = el('div','card-actions');
  const row1 = el('div','card-actions-row');
  const favBtn = el('button', 'btn-fav' + (isFav(l.id) ? ' active' : ''));
  favBtn.appendChild(txt(isFav(l.id) ? '❤️' : '♡'));
  favBtn.onclick = function() {
    const favs = getFavs();
    if (favs.includes(l.id)) {
      saveFavs(favs.filter(f => f !== l.id));
      favBtn.className = 'btn-fav';
      favBtn.textContent = '♡';
    } else {
      saveFavs([...favs, l.id]);
      favBtn.className = 'btn-fav active';
      favBtn.textContent = '❤️';
    }
    if (currentFilter === 'fav') { renderList(); if (leafletMap) updateMarkers(); }
  };
  row1.appendChild(favBtn);
  const openLink = el('a','btn-open');
  openLink.href = l.url;
  openLink.target = '_blank';
  openLink.rel = 'noopener noreferrer';
  openLink.appendChild(txt('Объявление'));
  row1.appendChild(openLink);
  actions.appendChild(row1);

  /* actions — row 2: Яндекс + 2GIS + На карте */
  if (l.lat && l.lon || l.address) {
    const row2 = el('div','card-actions-row');
    const ymapLink = el('a','btn-ymap');
    ymapLink.href = (l.lat && l.lon)
      ? 'https://maps.yandex.ru/?pt=' + l.lon + ',' + l.lat + '&z=16&l=map'
      : 'https://maps.yandex.ru/?text=' + encodeURIComponent((l.address||'') + ', Москва');
    ymapLink.target = '_blank';
    ymapLink.rel = 'noopener noreferrer';
    ymapLink.appendChild(txt('Яндекс'));
    row2.appendChild(ymapLink);

    const dgisLink = el('a','btn-2gis');
    dgisLink.href = 'https://2gis.ru/moscow/search/' + encodeURIComponent((l.address||'') + ', Москва');
    dgisLink.target = '_blank';
    dgisLink.rel = 'noopener noreferrer';
    dgisLink.appendChild(txt('2GIS'));
    row2.appendChild(dgisLink);

    if (l.lat && l.lon) {
      const mapBtn = el('button','btn-showmap');
      mapBtn.appendChild(txt('🗺️ На карте'));
      mapBtn.onclick = function() {
        showTab('map');
        if (!leafletMap) initMap();
        setTimeout(function() {
          leafletMap.setView([l.lat, l.lon], 16);
          markers.forEach(function(mk) {
            if (mk._latlng && Math.abs(mk._latlng.lat - l.lat) < 0.0001) mk.openPopup();
          });
        }, leafletMap ? 0 : 400);
      };
      row2.appendChild(mapBtn);
    }
    actions.appendChild(row2);
  }

  body.appendChild(actions);
  card.appendChild(body);
  return card;
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('count-label').textContent = filtered.length + ' вар.';
  const container = document.getElementById('list-view');
  container.textContent = '';
  const inner = el('div',''); inner.id = 'list-inner';
  if (!filtered.length) {
    const empty = el('div','');
    empty.style.cssText = 'text-align:center;padding:40px;color:#8e8e93';
    empty.appendChild(txt('Нет вариантов'));
    inner.appendChild(empty);
  } else {
    filtered.forEach(l => inner.appendChild(buildCard(l)));
  }
  container.appendChild(inner);
}

function setFilter(f) {
  currentFilter = f;
  ['all','fav'].forEach(id => {
    document.getElementById('filter-' + id).classList.toggle('active', id === f);
  });
  saveState();
  renderList();
  if (leafletMap) updateMarkers();
}

/* ---- tab switch ---- */
let _activeTab = 'list';
function showTab(tab) {
  _activeTab = tab;
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  document.getElementById('list-view').style.display = tab === 'list' ? 'block' : 'none';
  document.getElementById('map-view').style.display = tab === 'map' ? 'block' : 'none';
  if (tab === 'map') {
    if (!leafletMap) initMap();
    else leafletMap.invalidateSize();
  }
  saveState();
}

/* ---- map ---- */
function initMap() {
  leafletMap = L.map('map').setView([55.7641, 37.5929], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(leafletMap);
  /* Metro station markers */
  const mIcon = L.divIcon({
    html: '<div style="width:20px;height:20px;border-radius:50%;background:#e30611;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;font-family:-apple-system,sans-serif">М</div>',
    className: '', iconSize: [20,20], iconAnchor: [10,10]
  });
  METRO.forEach(function(m) {
    L.marker([m.lat, m.lon], {icon: mIcon, interactive: false, zIndexOffset: -100}).addTo(leafletMap);
  });
  updateMarkers(true);
}

function buildPopup(l) {
  const wrap = el('div','');

  /* photo slider in popup */
  const photos = l.photos || [];
  if (photos.length) {
    const imgWrap = el('div','mp-img-wrap');
    let pidx = 0;
    const img = el('img','mp-img');
    img.src = photos[0];
    img.alt = 'фото';
    imgWrap.appendChild(img);
    if (photos.length > 1) {
      const pcnt = el('span','mp-photo-counter');
      pcnt.appendChild(txt('1 / ' + photos.length));
      imgWrap.appendChild(pcnt);
      const goP = n => { pidx = (n + photos.length) % photos.length; img.src = photos[pidx]; pcnt.textContent = (pidx+1) + ' / ' + photos.length; };
      const pp = el('button','mp-nav mp-prev'); pp.type='button'; pp.appendChild(txt('‹'));
      pp.addEventListener('click', e => { e.stopPropagation(); goP(pidx-1); });
      imgWrap.appendChild(pp);
      const pn = el('button','mp-nav mp-next'); pn.type='button'; pn.appendChild(txt('›'));
      pn.addEventListener('click', e => { e.stopPropagation(); goP(pidx+1); });
      imgWrap.appendChild(pn);
      let sx=0;
      img.addEventListener('touchstart', e=>{sx=e.touches[0].clientX;},{passive:true});
      img.addEventListener('touchend', e=>{const dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>40) goP(pidx+(dx<0?1:-1));},{passive:true});
    }
    wrap.appendChild(imgWrap);
  }

  const price = el('div','mp-price');
  price.appendChild(txt(priceStr(l)));
  wrap.appendChild(price);
  const addr = el('div','mp-addr');
  addr.appendChild(txt('📍 ' + (l.address || '')));
  wrap.appendChild(addr);
  if (l.metro && l.metro.length) {
    const metro = el('div','mp-metro');
    metro.appendChild(txt('🚇 ' + metroStr(l)));
    wrap.appendChild(metro);
  }

  /* actions row: fav + open */
  const row = el('div','mp-actions');
  const favBtn = el('button', 'mp-fav' + (isFav(l.id) ? ' active' : ''));
  favBtn.appendChild(txt(isFav(l.id) ? '❤️' : '♡'));
  favBtn.addEventListener('click', () => {
    const favs = getFavs();
    if (favs.includes(l.id)) {
      saveFavs(favs.filter(f => f !== l.id));
      favBtn.className = 'mp-fav';
      favBtn.textContent = '♡';
    } else {
      saveFavs([...favs, l.id]);
      favBtn.className = 'mp-fav active';
      favBtn.textContent = '❤️';
    }
    if (currentFilter === 'fav') { renderList(); updateMarkers(); }
  });
  row.appendChild(favBtn);
  const link = el('a','mp-link');
  link.href = l.url;
  link.target = '_blank';
  link.rel = 'noopener noreferrer';
  link.appendChild(txt('Объявление'));
  row.appendChild(link);
  if (l.lat && l.lon || l.address) {
    const ymap = el('a','mp-ymap');
    ymap.href = (l.lat && l.lon)
      ? 'https://maps.yandex.ru/?pt=' + l.lon + ',' + l.lat + '&z=16&l=map'
      : 'https://maps.yandex.ru/?text=' + encodeURIComponent((l.address||'') + ', Москва');
    ymap.target = '_blank';
    ymap.rel = 'noopener noreferrer';
    ymap.appendChild(txt('Яндекс'));
    row.appendChild(ymap);
    const dgis = el('a','mp-2gis');
    dgis.href = 'https://2gis.ru/moscow/search/' + encodeURIComponent((l.address||'') + ', Москва');
    dgis.target = '_blank';
    dgis.rel = 'noopener noreferrer';
    dgis.appendChild(txt('2GIS'));
    row.appendChild(dgis);
  }
  wrap.appendChild(row);
  return wrap;
}

function updateMarkers(fitView) {
  markers.forEach(m => m.remove());
  markers = [];
  const filtered = getFiltered().filter(l => l.lat && l.lon);
  filtered.forEach(l => {
    const color = l.is_reference ? '#ffd60a' : '#34c759';
    const border = l.is_reference ? '#c8a800' : '#1e8c3a';
    const textColor = l.is_reference ? '#000' : '#fff';
    const mins = l.metro && l.metro.length && l.metro[0].minutes ? l.metro[0].minutes + 'м' : (l.is_reference ? '⭐' : '?');
    const iconHtml = '<div style="min-width:32px;height:26px;padding:0 6px;border-radius:13px;background:' + color + ';border:2px solid ' + border + ';box-shadow:0 2px 6px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:' + textColor + ';white-space:nowrap;font-family:-apple-system,sans-serif">' + mins + '</div>';
    const w = mins.length <= 2 ? 32 : mins.length * 8 + 16;
    const icon = L.divIcon({ html: iconHtml, className: '', iconSize: [w,26], iconAnchor: [w/2,13] });
    const popup = L.popup({maxWidth: 280}).setContent(buildPopup(l));
    const marker = L.marker([l.lat, l.lon], {icon}).addTo(leafletMap).bindPopup(popup);
    markers.push(marker);
  });
  if (fitView && markers.length) {
    leafletMap.fitBounds(L.featureGroup(markers).getBounds().pad(0.1), {maxZoom:14});
  }
}

/* ---- restore state on load ---- */
try {
  var _s = JSON.parse(localStorage.getItem('colife_state') || 'null') || {};
  if (_s.filter && ['all','fav'].indexOf(_s.filter) !== -1) {
    currentFilter = _s.filter;
    ['all','fav'].forEach(function(id) {
      document.getElementById('filter-' + id).classList.toggle('active', id === currentFilter);
    });
  }
  if (_s.geo && ['all','sadovoe','ttk','mkad'].indexOf(_s.geo) !== -1) {
    geoFilter = _s.geo;
    ['all','sadovoe','ttk','mkad'].forEach(function(id) {
      document.getElementById('geo-' + id).classList.toggle('active', id === geoFilter);
    });
  }
  if (_s.metro) {
    maxMetroMin = _s.metro;
    var _sv = maxMetroMin >= 999 ? 40 : maxMetroMin;
    document.getElementById('metro-slider').value = _sv;
    document.getElementById('metro-val').textContent = maxMetroMin >= 999 ? 'любое' : '≤ ' + _sv + ' мин';
  }
  if (_s.price) {
    maxPrice = _s.price;
    var _pv = maxPrice >= 999999 ? 55 : Math.round(maxPrice / 1000);
    document.getElementById('price-slider').value = _pv;
    document.getElementById('price-val').textContent = maxPrice >= 999999 ? 'любая' : '≤ ' + _pv + 'k';
  }
  if (_s.tab === 'map') {
    _activeTab = 'map';
    document.getElementById('tab-list').classList.remove('active');
    document.getElementById('tab-map').classList.add('active');
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('map-view').style.display = 'block';
  }
} catch(e) {}

renderList();
if (_activeTab === 'map') { try { initMap(); } catch(e) {} }
</script>
</body>
</html>
